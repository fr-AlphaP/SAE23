<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter une annonce</title>
    <link rel="stylesheet" href="../styles/style.css">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .form-section {
            max-width: 600px;
            margin: 50px auto;
            background-color: #1f1f1f;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.7);
        }

        .form-section h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="number"],
        input[type="url"],
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            background-color: #2c2c2c;
            color: #fff;
            border: 1px solid #444;
            border-radius: 5px;
        }

        textarea {
            resize: vertical;
        }

        button[type="submit"] {
            margin-top: 20px;
            padding: 12px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        button[type="submit"]:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="form-section">
        <h2>Ajouter une annonce de voiture</h2>
        <form action="ajouter_annonce.php" method="POST">
            <label for="marque">Marque :</label>
            <input type="text" id="marque" name="marque" required>

            <label for="modele">Modèle :</label>
            <input type="text" id="modele" name="modele" required>

            <label for="annee">Année :</label>
            <input type="number" id="annee" name="annee" required>

            <label for="prix">Prix (€) :</label>
            <input type="number" id="prix" name="prix" required>

            <label for="description">Description :</label>
            <textarea id="description" name="description" rows="4" required></textarea>

            <label for="image">Lien de l'image (URL) :</label>
            <input type="url" id="image" name="image" placeholder="https://exemple.com/voiture.jpg" required>

            <button type="submit">Ajouter l'annonce</button>
        </form>
    </div>

</body>
</html>
